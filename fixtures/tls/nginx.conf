events {}

http {
  # Default (no SNI match) presents the valid chain.
  server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate     /certs/valid.fullchain.crt;
    ssl_certificate_key /certs/valid.key;
    return 200 "uptimepage-mock tls default\n";
  }

  # CA-signed, far-future expiry -> cert check Up (trusted once the CA is imported).
  server {
    listen 443 ssl;
    server_name valid.tls.mock.uptimepage.dev;
    ssl_certificate     /certs/valid.fullchain.crt;
    ssl_certificate_key /certs/valid.key;
    return 200 "valid\n";
  }

  # CA-signed, expires within the warn/critical window -> cert check Degraded.
  server {
    listen 443 ssl;
    server_name expiring.tls.mock.uptimepage.dev;
    ssl_certificate     /certs/expiring.fullchain.crt;
    ssl_certificate_key /certs/expiring.key;
    return 200 "expiring\n";
  }

  # CA-signed but already expired -> cert check Down.
  server {
    listen 443 ssl;
    server_name expired.tls.mock.uptimepage.dev;
    ssl_certificate     /certs/expired.fullchain.crt;
    ssl_certificate_key /certs/expired.key;
    return 200 "expired\n";
  }

  # Standalone self-signed (untrusted) -> HTTPS verify_tls failure.
  server {
    listen 443 ssl;
    server_name selfsigned.tls.mock.uptimepage.dev;
    ssl_certificate     /certs/selfsigned.crt;
    ssl_certificate_key /certs/selfsigned.key;
    return 200 "selfsigned\n";
  }

  # CA-signed cert whose SAN does not match the SNI host -> hostname mismatch.
  server {
    listen 443 ssl;
    server_name wronghost.tls.mock.uptimepage.dev;
    ssl_certificate     /certs/wronghost.fullchain.crt;
    ssl_certificate_key /certs/wronghost.key;
    return 200 "wronghost\n";
  }
}
